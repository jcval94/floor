  max_orders_per_cycle: 8
  max_orders_per_ticker: 1
  max_orders_per_sector: 3

costs:
  commission_bps: 2.0
  slippage_bps: 3.0

m3_context:
  enabled: true
  near_weeks: 2
  imminent_weeks: 1
  far_weeks: 6
  default_min_reward_risk_ratio: 1.2
  min_reward_risk_ratio_when_near: 1.8
  min_reward_risk_ratio_when_far: 1.1
