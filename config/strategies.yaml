    position_sizing:
      risk_budget_pct_nav: 0.01
      max_notional_usd: 50000
    risk:
      stop_type: expected_floor_or_ceiling
    exits:
      take_profit_anchor: expected_ceiling_or_floor
      temporal_exit_session: CLOSE
    cooldown_cycles: 1
    max_rotation_per_cycle: 3
    liquidity:
      min_avg_dollar_volume: 5000000
    preferred_d1_buckets: OPEN_PLUS_2H,OPEN_PLUS_4H
