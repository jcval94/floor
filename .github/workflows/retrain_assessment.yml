name: retrain_assessment

on:
  schedule:
    - cron: "0 12 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retrain-assessment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assess_critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run retrain assessment
        run: PYTHONPATH=src python -m floor.main review-training
      - name: Commit assessment history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/training
          git diff --cached --quiet || git commit -m "chore: retrain assessment"
          git push

  assess_info:
    needs: assess_critical
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: retrain-assessment-meta
          path: data/training/reviews.jsonl
          if-no-files-found: ignore
