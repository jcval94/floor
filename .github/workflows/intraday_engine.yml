name: intraday_engine

on:
  schedule:
    # GitHub Actions schedule uses UTC and does not follow America/New_York DST directly.
    # We keep two narrow UTC windows to cover 09:15-16:15 ET year-round:
    # - EDT (UTC-4): 13:15-20:15 UTC
    # - EST (UTC-5): 14:15-21:15 UTC
    # The gate job remains the second defense for exact market checkpoints.
    - cron: "15,30,45 13-19 * * 1-5"
    - cron: "0,15 20 * * 1-5"
    - cron: "15,30,45 14-20 * * 1-5"
    - cron: "0,15 21 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force engine_critical even when gate would skip"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_event:
        description: "Event used when force_run=true"
        required: false
        default: "OPEN"
        type: choice
        options:
          - OPEN
          - OPEN_PLUS_2H
          - OPEN_PLUS_4H
          - OPEN_PLUS_6H
          - CLOSE

permissions:
  contents: write

concurrency:
  group: intraday-engine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ steps.guard.outputs.run }}
      reason: ${{ steps.guard.outputs.reason }}
      event: ${{ steps.guard.outputs.event }}
      session_day: ${{ steps.guard.outputs.session_day }}
    steps:
      - uses: actions/checkout@v5
      - name: Detect market checkpoint
        id: guard
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_run || 'false' }}" = "true" ]; then
            session_day=$(TZ=America/New_York date +%F)
            {
              echo "run=true"
              echo "reason=manual_force"
              echo "event=${{ github.event.inputs.force_event || 'OPEN' }}"
              echo "session_day=$session_day"
            } >> "$GITHUB_OUTPUT"
            echo "Manual force enabled: event=${{ github.event.inputs.force_event || 'OPEN' }}"
          else
            PYTHONPATH=src python -m utils.workflow_guards check --kind intraday --tolerance-minutes 20 --data-dir data
          fi

  engine_critical:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Initialize DBs
        run: make init-dbs
      - name: Normalize DB permissions
        run: |
          find data/market data/persistence -type d -exec chmod u+rwx {} +
          find data/market data/persistence -type f -exec chmod u+rw {} +
      - name: Validate SQLite bootstrap
        run: |
          sqlite3 data/market/market_data.sqlite "SELECT name FROM sqlite_master WHERE type='table' AND name='daily_bars';" | grep -qx 'daily_bars'
          for table in predictions signals orders training_reviews model_training_cycles; do
            sqlite3 data/persistence/app.sqlite "SELECT name FROM sqlite_master WHERE type='table' AND name='${table}';" | grep -qx "${table}"
          done
      - name: Ensure market data is populated before engine run
        run: |
          market_rows=$(sqlite3 data/market/market_data.sqlite "SELECT COUNT(*) FROM daily_bars;")
          if [ "${market_rows:-0}" = "0" ]; then
            echo "::warning::Market DB daily_bars is empty (COUNT(*)=0). Triggering Yahoo ingest preflight."
            PYTHONPATH=src python -m storage.yahoo_ingest --db data/market/market_data.sqlite --range 2y --interval 1d --sleep-seconds 0.4
          fi
      - name: Validate champion artifacts (repo-managed, non-LFS)
        run: |
          set -euo pipefail
          d1_champion="data/training/models/d1_champion.json"
          w1_champion="data/training/models/w1_champion.json"
          q1_champion="data/training/models/q1_champion.json"
          value_champion="data/training/models/value_champion.json"
          timing_champion="data/training/models/timing_champion.json"
          lfs_header='version https://git-lfs.github.com/spec/v1'

          for champion in "$d1_champion" "$w1_champion" "$q1_champion" "$value_champion" "$timing_champion"; do
            attr=$(git check-attr filter -- "$champion" | awk -F": " '{print $3}')
            if [ "$attr" = "lfs" ]; then
              echo "::error::Champion artifact is tracked by Git LFS: $champion"
              echo "Update .gitattributes to disable LFS for training JSON artifacts."
              exit 1
            fi
            if [ ! -f "$champion" ]; then
              echo "::error::Missing champion artifact: $champion"
              echo "Publish champions via retraining workflow before running intraday engine."
              exit 1
            fi
            head=$(head -c 120 "$champion" 2>/dev/null || true)
            if [ "${head#${lfs_header}}" != "$head" ]; then
              echo "::error::Champion artifact is unresolved Git LFS pointer: $champion"
              echo "Store champion payloads directly in-repo (non-LFS) for deterministic intraday runs."
              exit 1
            fi
          done
          echo "Champion artifacts validated (present + non-LFS)."

      - name: Capture baseline counters (SQLite + artifacts)
        id: db_before
        run: |
          set -euo pipefail
          mkdir -p data/logs
          PYTHONPATH=src python -m utils.workflow_validations capture-baseline             --db data/persistence/app.sqlite             --data-dir data             --streams predictions,signals             --output-file "$GITHUB_OUTPUT" | tee data/logs/intraday_baseline.json

      - name: Run intraday engine (idempotent retry)
        env:
          LIVE_TRADING_ENABLED: "false"
          GOOGLE_SHEETS_RECOMMENDATIONS_CSV_URL: ${{ secrets.GOOGLE_SHEETS_RECOMMENDATIONS_CSV_URL }}
        run: |
          set -euo pipefail
          mkdir -p data/logs
          for i in 1 2 3; do
            logfile="data/logs/intraday_engine_${{ needs.gate.outputs.event }}_attempt${i}.log"
            echo "Running attempt $i; logfile=$logfile"
            if PYTHONPATH=src python -m floor.main run-cycle --event "${{ needs.gate.outputs.event }}" 2>&1 | tee "$logfile"; then
              break
            fi
            echo "::warning::Intraday engine attempt $i failed. Showing log tail."
            tail -n 120 "$logfile" || true
            if [ "$i" -eq 3 ]; then
              echo "::error::Intraday engine failed after 3 attempts."
              exit 1
            fi
            sleep $((i*30))
          done

      - name: Validate dashboard snapshot JSON after run-cycle
        run: |
          set -euo pipefail
          dashboard_json="data/reports/dashboard.json"
          if [ ! -f "$dashboard_json" ]; then
            echo "::error::Missing required dashboard snapshot: $dashboard_json"
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/reports/dashboard.json")
          with path.open("r", encoding="utf-8") as fh:
              payload = json.load(fh)
          if not isinstance(payload, dict):
              raise SystemExit("dashboard.json must contain a JSON object at the top level")
          print(f"dashboard snapshot OK: {path} keys={len(payload)}")
          PY

      - name: Forecast diagnostics on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "Collecting forecast diagnostics"
          python - <<'PY'
          from pathlib import Path
          import json

          models = [
              Path("data/training/models/d1_champion.json"),
              Path("data/training/models/w1_champion.json"),
              Path("data/training/models/q1_champion.json"),
              Path("data/training/models/value_champion.json"),
              Path("data/training/models/timing_champion.json"),
              Path("data/training/models_file/d1_champion.pkl"),
              Path("data/training/models_file/w1_champion.pkl"),
              Path("data/training/models_file/q1_champion.pkl"),
              Path("data/training/models_file/value_champion.pkl"),
              Path("data/training/models_file/timing_champion.pkl"),
          ]
          for p in models:
              print(f"model_artifact path={p} exists={p.exists()}")

          log_dir = Path("data/logs")
          if log_dir.exists():
              print("recent_logs")
              for path in sorted(log_dir.glob("intraday_engine_*.log"))[-3:]:
                  print(f"- {path}")

          preds_dir = Path("data/predictions")
          if preds_dir.exists():
              files = sorted(preds_dir.glob("*.jsonl"))
              print(f"prediction_files={len(files)}")
              if files:
                  sample = files[-1]
                  lines = [line.strip() for line in sample.read_text(encoding="utf-8").splitlines() if line.strip()]
                  print(f"sample_prediction_file={sample} rows={len(lines)}")
                  if lines:
                      row = json.loads(lines[-1])
                      print(f"sample_prediction_symbol={row.get('symbol')} horizon={row.get('horizon')} model_version={row.get('model_version')}")
          PY

      - name: Validate persistence + artifact deltas after intraday run
        run: |
          set -euo pipefail
          db="data/persistence/app.sqlite"
          integrity=$(sqlite3 "$db" "PRAGMA quick_check;")
          [ "$integrity" = "ok" ] || { echo "::error::SQLite quick_check failed: $integrity"; exit 1; }

          python - <<'PY'
          import json
          from pathlib import Path

          baseline_line = Path('data/logs/intraday_baseline.json').read_text(encoding='utf-8').splitlines()[-1]
          baseline = json.loads(baseline_line)
          Path('data/logs/intraday_baseline_payload.json').write_text(json.dumps(baseline), encoding='utf-8')
          PY

          PYTHONPATH=src python -m utils.workflow_validations validate-deltas             --db data/persistence/app.sqlite             --data-dir data             --streams predictions,signals             --require-positive predictions,signals             --baseline-json data/logs/intraday_baseline_payload.json

          PYTHONPATH=src python -m utils.workflow_validations validate-latest-payload             --data-dir data             --stream predictions             --required-fields model_version

      - name: Validate prediction quality guardrails
        run: |
          set -euo pipefail
          PYTHONPATH=src python -m utils.workflow_validations validate-prediction-quality             --data-dir data             --stream predictions             --max-m3-blocked-ratio 0.4             --min-action-consistency-ratio 0.7             --action-return-tolerance 0.0             --sample-limit 10

      - name: Mark run
        run: PYTHONPATH=src python -m utils.workflow_guards mark --kind intraday --event "${{ needs.gate.outputs.event }}" --data-dir data
      - name: Commit auditable outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions data/signals data/orders data/snapshots data/persistence data/training/models data/training/metrics
          if git diff --cached --quiet; then
            echo "No auditable changes to commit."
            exit 0
          fi

          git commit -m "chore: intraday ${{ needs.gate.outputs.event }} artifacts"
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push after 3 attempts (non-fast-forward persisted)."
              exit 1
            fi
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
          done
      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intraday-engine-runtime
          path: |
            data/market/market_data.sqlite
            data/persistence/app.sqlite
            data/training/models
            data/training/metrics
            data/logs
          if-no-files-found: ignore

  engine_info:
    needs: [gate, engine_critical]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Emit decision
        run: |
          echo "run=${{ needs.gate.outputs.run }}"
          echo "event=${{ needs.gate.outputs.event }}"
          echo "reason=${{ needs.gate.outputs.reason }}"
