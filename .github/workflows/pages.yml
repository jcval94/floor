name: pages

on:
  workflow_run:
    workflows: ["intraday_engine", "ingest", "eod", "monitoring", "retrain_assessment", "retrain_execute", "manual_train_all_models"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build static site data payloads
        run: |
          PYTHONPATH=src python -m floor.main build-site
          mkdir -p data/market data/training
          PYTHONPATH=src python -m storage.yahoo_ingest --db data/market/market_data.sqlite --range 2y --interval 1d --sleep-seconds 0.4
          PYTHONPATH=src python -m features.build_training_from_db --db data/market/market_data.sqlite --output data/training/yahoo_market_rows.jsonl
          PYTHONPATH=src python -m utils.pages_build --data-dir data --site-data-dir site/data --universe-path config/universe.yaml
          touch site/.nojekyll
      - name: Show generated coverage metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          forecasts = json.loads(Path('site/data/forecasts.json').read_text(encoding='utf-8'))
          health = forecasts.get('data_health', {})
          latest_close = (health.get('sources', {}) or {}).get('latest_close', {})
          intraday = (health.get('sources', {}) or {}).get('latest_intraday', {})
          print('site/data/forecasts.json as_of:', forecasts.get('as_of'))
          print('latest_close coverage %:', latest_close.get('coverage_pct'))
          print('latest_intraday coverage %:', intraday.get('coverage_pct'))
          print('alerts:', health.get('alerts', []))
          PY
      - name: Warn when docs mirror looks stale (branch-based Pages risk)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          site_forecasts = Path('site/data/forecasts.json')
          docs_forecasts = Path('docs/data/forecasts.json')
          if not site_forecasts.exists() or not docs_forecasts.exists():
            print('docs/site forecasts file missing; skipping stale mirror warning')
            raise SystemExit(0)

          site_rows = json.loads(site_forecasts.read_text(encoding='utf-8')).get('rows', [])
          docs_rows = json.loads(docs_forecasts.read_text(encoding='utf-8')).get('rows', [])
          if len(docs_rows) < len(site_rows):
            print('::warning::docs/data/forecasts.json has fewer rows than generated site/data/forecasts.json.')
            print('::warning::If GitHub Pages source is set to Deploy from branch/docs, users can see stale data.')
            print('::warning::Set Pages source to GitHub Actions to publish the artifact generated by this workflow.')
          else:
            print('docs mirror row count is not behind site artifact')
          PY
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
