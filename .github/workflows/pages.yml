name: pages

on:
  workflow_run:
    workflows: ["intraday_engine", "ingest", "eod", "monitoring", "retrain_assessment", "retrain_execute", "manual_train_all_models"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build static site data payloads
        run: |
          PYTHONPATH=src python -m floor.main build-site
          PYTHONPATH=src python -m utils.pages_build --data-dir data --site-data-dir site/data --universe-path config/universe.yaml --mirror-site-dir docs
          touch site/.nojekyll
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
