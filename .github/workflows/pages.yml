name: pages

on:
  workflow_run:
    workflows: ["intraday_engine"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-intraday-publish
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build static site data payloads
        run: |
          PYTHONPATH=src python -m utils.pages_build --data-dir data --site-data-dir site/data --universe-path config/universe.yaml
          touch site/.nojekyll
      - name: Validate as_of coherence across report and site payloads
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          def parse_iso(value: str | None, label: str) -> datetime:
              if not value:
                  raise SystemExit(f"{label} is missing")
              normalized = value.replace("Z", "+00:00")
              try:
                  dt = datetime.fromisoformat(normalized)
              except ValueError as exc:
                  raise SystemExit(f"{label} is not valid ISO-8601: {value}") from exc
              if dt.tzinfo is None:
                  dt = dt.replace(tzinfo=timezone.utc)
              return dt.astimezone(timezone.utc)

          report = json.loads(Path("data/reports/dashboard.json").read_text(encoding="utf-8"))
          site_dashboard = json.loads(Path("site/data/dashboard.json").read_text(encoding="utf-8"))
          site_forecasts = json.loads(Path("site/data/forecasts.json").read_text(encoding="utf-8"))

          if not report:
              raise SystemExit("data/reports/dashboard.json is empty")
          if not site_dashboard:
              raise SystemExit("site/data/dashboard.json is empty")
          if not site_forecasts:
              raise SystemExit("site/data/forecasts.json is empty")

          report_ref = report.get("as_of") or report.get("generated_at")
          site_dashboard_ref = site_dashboard.get("as_of") or site_dashboard.get("generated_at")
          site_forecasts_ref = site_forecasts.get("as_of") or site_forecasts.get("generated_at")

          report_dt = parse_iso(report_ref, "data/reports/dashboard.json as_of|generated_at")
          dashboard_dt = parse_iso(site_dashboard_ref, "site/data/dashboard.json as_of|generated_at")
          forecasts_dt = parse_iso(site_forecasts_ref, "site/data/forecasts.json as_of|generated_at")

          generated_at = report.get("generated_at")
          generated_dt = parse_iso(generated_at, "data/reports/dashboard.json generated_at")
          max_age_hours = 8
          age_seconds = (datetime.now(timezone.utc) - generated_dt).total_seconds()
          if age_seconds < 0:
              raise SystemExit(
                  "data/reports/dashboard.json generated_at is in the future "
                  f"(generated_at={generated_dt.isoformat()})"
              )
          if age_seconds > max_age_hours * 3600:
              raise SystemExit(
                  "data/reports/dashboard.json is stale for publication "
                  f"(age_hours={age_seconds/3600:.2f} max_age_hours={max_age_hours})"
              )

          if dashboard_dt != report_dt:
              raise SystemExit(
                  "site/data/dashboard.json timestamp is not coherent with data/reports/dashboard.json "
                  f"(site={dashboard_dt.isoformat()} report={report_dt.isoformat()})"
              )

          skew_seconds = abs((report_dt - forecasts_dt).total_seconds())
          if skew_seconds > 36 * 3600:
              raise SystemExit(
                  "site/data/forecasts.json timestamp is too far from data/reports/dashboard.json "
                  f"(skew_hours={skew_seconds/3600:.2f})"
              )

          print("as_of coherence OK")
          print(f"report={report_dt.isoformat()}")
          print(f"site_dashboard={dashboard_dt.isoformat()}")
          print(f"site_forecasts={forecasts_dt.isoformat()} skew_hours={skew_seconds/3600:.2f}")
          print(
              "publish_audit "
              f"final_as_of={forecasts_dt.isoformat()} "
              f"report_generated_at={generated_dt.isoformat()} "
              f"report_age_hours={age_seconds/3600:.2f}"
          )
          PY
      - name: Show generated coverage metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          forecasts = json.loads(Path('site/data/forecasts.json').read_text(encoding='utf-8'))
          health = forecasts.get('data_health', {})
          latest_close = (health.get('sources', {}) or {}).get('latest_close', {})
          intraday = (health.get('sources', {}) or {}).get('latest_intraday', {})
          print('site/data/forecasts.json as_of:', forecasts.get('as_of'))
          print('latest_close coverage %:', latest_close.get('coverage_pct'))
          print('latest_intraday coverage %:', intraday.get('coverage_pct'))
          print('alerts:', health.get('alerts', []))
          PY
      - name: Warn when docs mirror looks stale (branch-based Pages risk)
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          site_forecasts = Path('site/data/forecasts.json')
          docs_forecasts = Path('docs/data/forecasts.json')
          if not site_forecasts.exists() or not docs_forecasts.exists():
            print('docs/site forecasts file missing; skipping stale mirror warning')
            raise SystemExit(0)

          site_rows = json.loads(site_forecasts.read_text(encoding='utf-8')).get('rows', [])
          docs_rows = json.loads(docs_forecasts.read_text(encoding='utf-8')).get('rows', [])
          if len(docs_rows) < len(site_rows):
            print('::warning::docs/data/forecasts.json has fewer rows than generated site/data/forecasts.json.')
            print('::warning::If GitHub Pages source is set to Deploy from branch/docs, users can see stale data.')
            print('::warning::Set Pages source to GitHub Actions to publish the artifact generated by this workflow.')
          else:
            print('docs mirror row count is not behind site artifact')
          PY
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
