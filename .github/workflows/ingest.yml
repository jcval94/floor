name: ingest

on:
  schedule:
    - cron: "*/30 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ steps.guard.outputs.run }}
      reason: ${{ steps.guard.outputs.reason }}
      session_day: ${{ steps.guard.outputs.session_day }}
    steps:
      - uses: actions/checkout@v4
      - name: Check market gate
        id: guard
        run: PYTHONPATH=src python -m utils.workflow_guards check --kind always_open_day --data-dir data

  ingest_critical:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize DBs
        run: make init-dbs
      - name: Normalize DB permissions
        run: |
          find data/market data/persistence -type d -exec chmod u+rwx {} +
          find data/market data/persistence -type f -exec chmod u+rw {} +
      - name: Validate SQLite bootstrap
        run: |
          sqlite3 data/market/market_data.sqlite "SELECT name FROM sqlite_master WHERE type='table' AND name='daily_bars';" | grep -qx 'daily_bars'
          for table in predictions signals orders training_reviews model_training_cycles; do
            sqlite3 data/persistence/app.sqlite "SELECT name FROM sqlite_master WHERE type='table' AND name='${table}';" | grep -qx "${table}"
          done
      - name: Refresh in-repo market DB from Yahoo (responsible polling)
        run: PYTHONPATH=src python -m storage.yahoo_ingest --db data/market/market_data.sqlite --range 2y --interval 1d --sleep-seconds 0.4
      - name: Ingest data (idempotent retry)
        run: |
          for i in 1 2 3; do
            PYTHONPATH=src python -m floor.main run-cycle --event OPEN && break || sleep $((i*20))
          done
      - name: Mark run
        run: PYTHONPATH=src python -m utils.workflow_guards mark --kind ingest --data-dir data
      - name: Commit changed history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: ingest artifacts"
          git push
      - name: Upload sqlite artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-sqlite
          path: |
            data/market/market_data.sqlite
            data/persistence/app.sqlite
          if-no-files-found: ignore

  ingest_info:
    needs: [gate, ingest_critical]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Summary
        run: echo "ingest status=${{ needs.gate.outputs.run }} reason=${{ needs.gate.outputs.reason }}"
