name: retrain_execute

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force retrain even if no drift"
        required: false
        default: "false"
      dataset_path:
        description: "Path to modelable dataset JSON committed in the repo"
        required: false
        default: "data/training/modelable_dataset.json"
      version:
        description: "Version tag for metrics artifact (optional)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: retrain-execute-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retrain_critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide retrain gate
        id: gate
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -f data/training/reviews.jsonl ] && tail -n 1 data/training/reviews.jsonl | grep -q '"action": "RETRAIN"'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run model retraining (replace in-repo model artifacts)
        if: steps.gate.outputs.run == 'true'
        env:
          DATASET_PATH: ${{ github.event.inputs.dataset_path }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          VERSION_TAG="$VERSION_INPUT"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="$(date -u +%Y%m%dT%H%M%SZ)"
          fi
          bash scripts/retrain_models.sh "$DATASET_PATH" data/training "$VERSION_TAG"

      - name: Commit retrain artifacts
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/training
          git diff --cached --quiet || git commit -m "chore: retrain and replace in-repo model artifacts"
          git push

  retrain_info:
    needs: retrain_critical
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "retrain_execute finished"
